name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - run: pnpm install

      - name: Build core
        run: pnpm --filter @devpulse/core build

      - name: Run tests with coverage
        run: pnpm --filter @devpulse/core test:coverage

      - name: Generate and commit coverage badge
        if: matrix.node-version == 24 && github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          COVERAGE=$(node -e "
            const s = require('./packages/core/coverage/coverage-summary.json');
            console.log(Math.round(s.total.statements.pct));
          ")
          if [ "$COVERAGE" -ge 90 ]; then COLOR="brightgreen";
          elif [ "$COVERAGE" -ge 80 ]; then COLOR="green";
          elif [ "$COVERAGE" -ge 70 ]; then COLOR="yellow";
          else COLOR="red"; fi
          mkdir -p .github/badges
          curl -s "https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR}" > .github/badges/coverage.svg
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.svg
          git diff --cached --quiet || git commit -m "ci: update coverage badge [skip ci]"
          git push
