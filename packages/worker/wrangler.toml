name = "devpulse"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[assets]
directory = "../web/dist"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "devpulse-db"
database_id = "" # Run: npx wrangler d1 create devpulse-db, then paste the ID here

# Set AI provider secrets via:
#   npx wrangler secret put AI_API_KEY
#   npx wrangler secret put AI_BASE_URL
#   npx wrangler secret put AI_MODEL

# Uncomment and customize for your domain:
# [[routes]]
# pattern = "devpulse.yourdomain.com/*"
# zone_name = "yourdomain.com"

[triggers]
crons = ["0 * * * *"]
