name = "devpulse-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "devpulse-db"
database_id = "" # Fill after running: wrangler d1 create devpulse-db

[vars]
# ANTHROPIC_API_KEY = "" # Set via: wrangler secret put ANTHROPIC_API_KEY

[triggers]
crons = ["0 * * * *"]
